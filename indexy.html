<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Progress Tracker - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #333;
            font-size: 1.8rem;
        }

        .header h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 100px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-success {
            background: #28a745;
        }

        .dashboard {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: white;
            color: #333;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .furniture-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .furniture-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .furniture-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .furniture-id {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
        }

        .furniture-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-Pending { background: #ffc107; color: #333; }
        .status-In-Progress { background: #17a2b8; color: white; }
        .status-Completed { background: #28a745; color: white; }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .furniture-detail {
            margin: 10px 0;
            color: #555;
            font-size: 0.9rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .card-actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.85rem;
        }

        .progress-entries {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .progress-entry {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .progress-date {
            color: #667eea;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }

        .alert-success { background: #28a745; }
        .alert-error { background: #dc3545; }
        .alert-info { background: #17a2b8; }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .hidden { display: none; }
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }
        .mb-20 { margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" id="header" style="display: none;">
            <h1>Furniture <span>Progress Tracker</span></h1>
            <div class="user-info">
                <span class="user-badge" id="userName">User</span>
                <span class="user-badge" id="userRole">Role</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="loginBox" class="login-box">
            <h2>🔐 Furniture Progress Tracker</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <hr style="margin: 20px 0;">
            <div class="text-center">
                <p><strong>Customer?</strong> <a href="track.html" target="_blank">Click here to track your order</a></p>
                <p style="font-size: 0.85rem; color: #666; margin-top: 10px;">Default owner: owner / 12345</p>
            </div>
        </div>

        <div id="dashboard" class="dashboard">
            <div class="tabs" id="tabs"></div>
            <div id="furnitureSection"></div>
            <div id="usersSection" style="display: none;"></div>
            <div id="linksSection" style="display: none;"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Modal Title</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let furnitureList = [];
        let progressList = [];
        let usersList = [];
        let viewLinks = {};
        let currentUser = null;

        function initData() {
            const storedFurniture = localStorage.getItem('furnitureList');
            if (storedFurniture) {
                furnitureList = JSON.parse(storedFurniture);
            } else {
                furnitureList = [
                    { id: "F001", name: "TV Cabinet", type: "Plywood", customerName: "Encik Faris", assignedCraftsman: "craftsman3", progress: 50, status: "In Progress" },
                    { id: "F002", name: "Shoes Rack", type: "Plywood", customerName: "Puan Sabariah", assignedCraftsman: "craftsman2", progress: 0, status: "Pending" }
                ];
            }

            const storedProgress = localStorage.getItem('progressList');
            if (storedProgress) {
                progressList = JSON.parse(storedProgress);
            } else {
                progressList = [
                    { furnitureId: "F001", date: "2025-11-03", description: "All material has been sanded and joined", imagePath: "", progressPercent: 45 },
                    { furnitureId: "F001", date: "2025-11-03", description: "All wood are stained", imagePath: "", progressPercent: 50 }
                ];
            }

            const storedUsers = localStorage.getItem('usersList');
            if (storedUsers) {
                usersList = JSON.parse(storedUsers);
            } else {
                usersList = [
                    { username: "owner", name: "Admin", password: "12345", role: "OWNER" },
                    { username: "craftsman1", name: "James", password: "pass123", role: "CRAFTSMAN" },
                    { username: "craftsman2", name: "Ali", password: "ali123", role: "CRAFTSMAN" },
                    { username: "craftsman3", name: "Faiz", password: "faiz777", role: "CRAFTSMAN" }
                ];
            }

            const storedLinks = localStorage.getItem('viewLinks');
            if (storedLinks) {
                viewLinks = JSON.parse(storedLinks);
            } else {
                viewLinks = { "EN84FMZ2": "F001" };
            }
        }

        function saveAllData() {
            localStorage.setItem('furnitureList', JSON.stringify(furnitureList));
            localStorage.setItem('progressList', JSON.stringify(progressList));
            localStorage.setItem('usersList', JSON.stringify(usersList));
            localStorage.setItem('viewLinks', JSON.stringify(viewLinks));
        }

        function showAlert(message, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        function getTodayDate() {
            return new Date().toISOString().split('T')[0];
        }

        function findFurnitureById(id) {
            return furnitureList.find(f => f.id === id);
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = usersList.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = user;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('header').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userRole').textContent = user.role;
                renderDashboard();
                showAlert(`Welcome, ${user.name}!`, 'success');
            } else {
                showAlert('Invalid credentials!', 'error');
            }
        });

        function logout() {
            currentUser = null;
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('header').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function renderDashboard() {
            const tabsDiv = document.getElementById('tabs');
            let tabsHtml = '';
            
            if (currentUser.role === 'OWNER') {
                tabsHtml = `
                    <button class="tab-btn active" onclick="showTab('furniture', this)">📋 Furniture</button>
                    <button class="tab-btn" onclick="showTab('users', this)">👥 Users</button>
                    <button class="tab-btn" onclick="showTab('links', this)">🔗 View Links</button>
                    <button class="tab-btn" onclick="showAddFurnitureModal()">➕ Add Furniture</button>
                    <button class="tab-btn" onclick="showAddUserModal()">➕ Add User</button>
                `;
            } else {
                tabsHtml = `
                    <button class="tab-btn active" onclick="showTab('furniture', this)">📋 My Assignments</button>
                `;
            }
            
            tabsDiv.innerHTML = tabsHtml;
            showTab('furniture', document.querySelector('.tab-btn'));
        }

        function showTab(tabName, btn) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (btn) btn.classList.add('active');
            
            if (tabName === 'furniture') {
                document.getElementById('usersSection').style.display = 'none';
                document.getElementById('linksSection').style.display = 'none';
                document.getElementById('furnitureSection').style.display = 'block';
                renderFurniture();
            } else if (tabName === 'users' && currentUser.role === 'OWNER') {
                document.getElementById('furnitureSection').style.display = 'none';
                document.getElementById('linksSection').style.display = 'none';
                document.getElementById('usersSection').style.display = 'block';
                renderUsers();
            } else if (tabName === 'links' && currentUser.role === 'OWNER') {
                document.getElementById('furnitureSection').style.display = 'none';
                document.getElementById('usersSection').style.display = 'none';
                document.getElementById('linksSection').style.display = 'block';
                renderLinks();
            }
        }

        function renderFurniture() {
            let filteredList = furnitureList;
            
            if (currentUser.role === 'CRAFTSMAN') {
                filteredList = furnitureList.filter(f => f.assignedCraftsman === currentUser.username);
            }
            
            if (filteredList.length === 0) {
                document.getElementById('furnitureSection').innerHTML = '<div class="text-center" style="padding: 50px;">No furniture found.</div>';
                return;
            }
            
            let html = '<div class="cards-grid">';
            
            filteredList.forEach(furniture => {
                html += `
                    <div class="furniture-card">
                        <div class="furniture-header">
                            <span class="furniture-id">${furniture.id}</span>
                            <span class="furniture-status status-${furniture.status.replace(' ', '-')}">${furniture.status}</span>
                        </div>
                        <h3>${furniture.name}</h3>
                        <div class="furniture-detail">📦 Type: ${furniture.type}</div>
                        <div class="furniture-detail">👤 Customer: ${furniture.customerName}</div>
                        <div class="furniture-detail">🔨 Craftsman: ${furniture.assignedCraftsman}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${furniture.progress}%"></div>
                        </div>
                        <div class="furniture-detail">Progress: ${furniture.progress}%</div>
                        <div class="card-actions">
                `;
                
                if (currentUser.role === 'OWNER') {
                    html += `
                        <button class="btn btn-secondary" onclick="showAssignModal('${furniture.id}')">Assign</button>
                        <button class="btn" onclick="showUpdateProgressModal('${furniture.id}')">Update</button>
                        <button class="btn btn-danger" onclick="deleteFurniture('${furniture.id}')">Delete</button>
                        <button class="btn btn-success" onclick="generateLink('${furniture.id}')">Get Link</button>
                    `;
                } else if (currentUser.role === 'CRAFTSMAN' && furniture.assignedCraftsman === currentUser.username) {
                    html += `<button class="btn" onclick="showUpdateProgressModal('${furniture.id}')">Update Progress</button>`;
                }
                
                html += `<button class="btn btn-secondary" onclick="viewAllProgress('${furniture.id}')">View History</button>`;
                html += `</div></div>`;
            });
            
            html += '</div>';
            document.getElementById('furnitureSection').innerHTML = html;
        }

        function renderUsers() {
            let html = '<div class="cards-grid">';
            usersList.forEach(user => {
                html += `
                    <div class="furniture-card">
                        <div class="furniture-header">
                            <span class="furniture-id">${user.username}</span>
                            <span class="furniture-status status-${user.role === 'OWNER' ? 'In-Progress' : 'Pending'}">${user.role}</span>
                        </div>
                        <div class="furniture-detail">👤 Name: ${user.name}</div>
                    </div>
                `;
            });
            html += '</div>';
            document.getElementById('usersSection').innerHTML = html;
        }

        function renderLinks() {
            let html = '<div class="cards-grid">';
            for (const [code, furnitureId] of Object.entries(viewLinks)) {
                const furniture = findFurnitureById(furnitureId);
                html += `
                    <div class="furniture-card">
                        <div class="furniture-header">
                            <span class="furniture-id">Link Code</span>
                        </div>
                        <div class="furniture-detail"><strong>Code:</strong> ${code}</div>
                        <div class="furniture-detail"><strong>Furniture:</strong> ${furnitureId} - ${furniture?.name || 'Unknown'}</div>
                        <div class="card-actions">
                            <button class="btn btn-secondary" onclick="copyToClipboard('${code}')">Copy Code</button>
                            <button class="btn btn-success" onclick="window.open('track.html?code=${code}', '_blank')">Customer View</button>
                        </div>
                    </div>
                `;
            }
            if (Object.keys(viewLinks).length === 0) {
                html = '<div class="text-center" style="padding: 50px;">No links generated yet.</div>';
            } else {
                html += '</div>';
            }
            document.getElementById('linksSection').innerHTML = html;
        }

        function showAddFurnitureModal() {
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <form id="addFurnitureForm">
                    <div class="form-group">
                        <label>Furniture ID</label>
                        <input type="text" id="furnitureId" required>
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="furnitureName" required>
                    </div>
                    <div class="form-group">
                        <label>Type/Material</label>
                        <input type="text" id="furnitureType" required>
                    </div>
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="customerName" required>
                    </div>
                    <button type="submit" class="btn">Add Furniture</button>
                </form>
            `;
            document.getElementById('modalTitle').textContent = 'Add New Furniture';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('addFurnitureForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const newFurniture = {
                    id: document.getElementById('furnitureId').value,
                    name: document.getElementById('furnitureName').value,
                    type: document.getElementById('furnitureType').value,
                    customerName: document.getElementById('customerName').value,
                    assignedCraftsman: "Unassigned",
                    progress: 0,
                    status: "Pending"
                };
                if (findFurnitureById(newFurniture.id)) {
                    showAlert('ID already exists!', 'error');
                    return;
                }
                furnitureList.push(newFurniture);
                saveAllData();
                renderFurniture();
                closeModal();
                showAlert('Furniture added successfully!', 'success');
            });
        }

        function deleteFurniture(id) {
            if (confirm('Are you sure you want to delete this furniture?')) {
                furnitureList = furnitureList.filter(f => f.id !== id);
                progressList = progressList.filter(p => p.furnitureId !== id);
                saveAllData();
                renderFurniture();
                showAlert('Furniture deleted!', 'success');
            }
        }

        function showAssignModal(furnitureId) {
            const craftsmen = usersList.filter(u => u.role === 'CRAFTSMAN');
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <form id="assignForm">
                    <div class="form-group">
                        <label>Select Craftsman</label>
                        <select id="craftsmanSelect" required>
                            <option value="">Choose craftsman...</option>
                            ${craftsmen.map(c => `<option value="${c.username}">${c.name} (${c.username})</option>`).join('')}
                        </select>
                    </div>
                    <button type="submit" class="btn">Assign</button>
                </form>
            `;
            document.getElementById('modalTitle').textContent = 'Assign Craftsman';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('assignForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const craftsman = document.getElementById('craftsmanSelect').value;
                const furniture = findFurnitureById(furnitureId);
                if (furniture) {
                    furniture.assignedCraftsman = craftsman;
                    if (furniture.progress > 0) furniture.status = "In Progress";
                    else furniture.status = "Pending";
                    saveAllData();
                    renderFurniture();
                    closeModal();
                    showAlert(`Assigned ${craftsman} to ${furnitureId}`, 'success');
                }
            });
        }

        function showUpdateProgressModal(furnitureId) {
            const furniture = findFurnitureById(furnitureId);
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <form id="progressForm">
                    <div class="form-group">
                        <label>Current Progress: ${furniture.progress}%</label>
                        <input type="number" id="progressPercent" min="0" max="100" required placeholder="Enter new progress (0-100)">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="progressDesc" rows="3" required placeholder="What was done?"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image Path (optional)</label>
                        <input type="text" id="progressImage" placeholder="image filename">
                    </div>
                    <button type="submit" class="btn">Update Progress</button>
                </form>
            `;
            document.getElementById('modalTitle').textContent = `Update Progress - ${furnitureId}`;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('progressForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const newProgress = parseInt(document.getElementById('progressPercent').value);
                const description = document.getElementById('progressDesc').value;
                const imagePath = document.getElementById('progressImage').value;
                const progressEntry = {
                    furnitureId: furnitureId,
                    date: getTodayDate(),
                    description: description,
                    imagePath: imagePath,
                    progressPercent: newProgress
                };
                progressList.push(progressEntry);
                furniture.progress = newProgress;
                if (newProgress >= 100) furniture.status = "Completed";
                else if (newProgress > 0) furniture.status = "In Progress";
                else furniture.status = "Pending";
                saveAllData();
                renderFurniture();
                closeModal();
                showAlert('Progress updated!', 'success');
            });
        }

        function viewAllProgress(furnitureId) {
            const progress = progressList.filter(p => p.furnitureId === furnitureId);
            const furniture = findFurnitureById(furnitureId);
            let html = `<h4>${furniture.name} (${furnitureId})</h4>`;
            if (progress.length === 0) {
                html += '<p>No progress updates yet.</p>';
            } else {
                progress.forEach(p => {
                    html += `
                        <div class="progress-entry">
                            <span class="progress-date">${p.date}</span><br>
                            <strong>Progress:</strong> ${p.progressPercent}%<br>
                            <strong>Description:</strong> ${p.description}<br>
                            ${p.imagePath ? `<strong>Image:</strong> ${p.imagePath}<br>` : ''}
                            <hr>
                        </div>
                    `;
                });
            }
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = html;
            document.getElementById('modalTitle').textContent = `Progress History - ${furnitureId}`;
            document.getElementById('modal').style.display = 'flex';
        }

        function generateLink(furnitureId) {
            let existingCode = null;
            for (const [code, fid] of Object.entries(viewLinks)) {
                if (fid === furnitureId) {
                    existingCode = code;
                    break;
                }
            }
            if (existingCode) {
                showAlert(`Existing link code: ${existingCode}`, 'info');
                copyToClipboard(existingCode);
            } else {
                const code = generateRandomCode(8);
                viewLinks[code] = furnitureId;
                saveAllData();
                showAlert(`New link generated: ${code}`, 'success');
                copyToClipboard(code);
            }
        }

        function generateRandomCode(len) {
            const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
            let result = "";
            for (let i = 0; i < len; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showAlert(`Copied: ${text}`, 'success');
        }

        function showAddUserModal() {
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <form id="addUserForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="newUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="newName" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="newRole" required>
                            <option value="CRAFTSMAN">CRAFTSMAN</option>
                            <option value="OWNER">OWNER</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Add User</button>
                </form>
            `;
            document.getElementById('modalTitle').textContent = 'Add New User';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('addUserForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const newUser = {
                    username: document.getElementById('newUsername').value,
                    name: document.getElementById('newName').value,
                    password: document.getElementById('newPassword').value,
                    role: document.getElementById('newRole').value
                };
                if (usersList.find(u => u.username === newUser.username)) {
                    showAlert('Username already exists!', 'error');
                    return;
                }
                usersList.push(newUser);
                saveAllData();
                renderUsers();
                closeModal();
                showAlert('User added successfully!', 'success');
            });
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        initData();
        saveAllData();
    </script>
</body>
</html>
